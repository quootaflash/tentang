<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Operator - Rekrutmen</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      min-height: 100vh;
      padding: 20px 15px;
      color: #2c3e50;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 35px;
      padding: 10px 0;
    }

    header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    header p {
      font-size: 15px;
      color: #6c757d;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 20px;
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: white;
      border-radius: 20px;
      padding: 22px 12px;
      text-decoration: none;
      color: #2c3e50;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
      transition: all 0.3s ease;
      height: 130px;
    }

    .menu-item:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 25px rgba(52, 152, 219, 0.15);
    }

    .menu-item i {
      font-size: 36px;
      margin-bottom: 12px;
      transition: transform 0.3s;
    }

    .menu-item:hover i {
      transform: scale(1.12);
    }

    .menu-item span {
      font-size: 14.5px;
      font-weight: 600;
      text-align: center;
      line-height: 1.3;
    }

    /* Warna ikon khusus */
    .ats i    { color: #2980b9; }
    .lamaran i { color: #27ae60; }

    .footer {
      text-align: center;
      margin-top: 50px;
      font-size: 13px;
      color: #95a5a6;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Menu Operator</h1>
      <p>Pilih menu di bawah ini</p>
    </header>

    <div class="menu-grid">

      <!-- Menu ATS - GANTI LINK SESUAI KEBUTUHAN -->
      <a href="https://contoh-link-ats.com" target="_blank" class="menu-item ats">
        <i class="fas fa-briefcase"></i>
        <span>ATS</span>
      </a>

      <!-- Menu LAMARAN - GANTI LINK SESUAI KEBUTUHAN -->
      <a href="https://contoh-link-lamaran.com" target="_blank" class="menu-item lamaran">
        <i class="fas fa-file-alt"></i>
        <span>Lamaran</span>
      </a>

      <!-- Contoh menu tambahan (bisa dihapus atau ditambah) -->
      <a href="https://contoh-link-lowongan.com" target="_blank" class="menu-item">
        <i class="fas fa-search" style="color:#e67e22;"></i>
        <span>Lowongan</span>
      </a>

      <a href="https://contoh-link-riwayat.com" target="_blank" class="menu-item">
        <i class="fas fa-history" style="color:#8e44ad;"></i>
        <span>Riwayat</span>
      </a>

    </div>

    <div class="footer">
      © 2026 Aplikasi Rekrutmen Operator<br>
      Semarang • Semua hak dilindungi
    </div>
  </div>

</body>
</html>
