<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CVPRO v967.10</title>

  <!-- PWA Meta -->
  <meta name="theme-color" content="#111827">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CVPRO">
  
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='30' fill='%23111827'/><text x='50' y='68' font-size='42' font-family='Arial,sans-serif' font-weight='900' fill='white' text-anchor='middle'>CP</text></svg>">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4F46E5; /* Indigo 600 */
      --bg: #111827;
      --card: #1F2937;
      --text: #F9FAFB;
      --text-muted: #9CA3AF;
      --danger: #EF4444;
      --safe-bottom: env(safe-area-inset-bottom, 20px);
      --safe-top: env(safe-area-inset-top, 10px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; outline: none; }
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* --- ANIMATIONS --- */
    .fade-in { animation: fadeIn 0.3s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* --- PAGES --- */
    .page {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: calc(var(--safe-top) + 20px) 20px calc(90px + var(--safe-bottom)) 20px;
      display: none; opacity: 0; transition: opacity 0.3s ease;
    }
    .page::-webkit-scrollbar { display: none; }
    .page.active { display: block; opacity: 1; }

    .container { max-width: 600px; margin: 0 auto; }

    /* --- HEADER --- */
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .brand { display: flex; align-items: center; gap: 15px; }
    .logo {
      width: 50px; height: 50px; background: linear-gradient(135deg, var(--primary), #4338ca);
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      color: white; font-size: 24px; font-weight: 900; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
    }
    .brand-info h1 { font-size: 20px; font-weight: 800; }
    .brand-info p { font-size: 10px; font-weight: 700; color: var(--primary); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

    /* --- MENU GRID --- */
    .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .menu-item {
      background: var(--card); border: 1px solid #374151; border-radius: 16px; padding: 18px;
      display: flex; align-items: center; gap: 14px; transition: 0.2s; position: relative; overflow: hidden; cursor: pointer;
    }
    .menu-item:active { transform: scale(0.96); border-color: var(--primary); }
    .icon-box { width: 42px; height: 42px; border-radius: 12px; background: rgba(79, 70, 229, 0.1); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .menu-text { display: flex; flex-direction: column; }
    .menu-label { font-size: 15px; font-weight: 700; }
    .menu-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* --- WEBVIEW (NATIVE LOOK) --- */
    #webview-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 9999; display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform 0.3s ease;
    }
    #webview-overlay.active { transform: translateY(0); }

    .wb-header {
      height: 70px; padding: 0 20px; padding-top: var(--safe-top);
      background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(10px);
      border-bottom: 1px solid #374151; display: flex; align-items: center; justify-content: space-between;
    }
    .wb-title { font-size: 14px; font-weight: 700; color: white; }
    .wb-btn-back {
      display: flex; align-items: center; gap: 8px; color: white; font-size: 14px; font-weight: 600;
      background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 10px; border: none; cursor: pointer;
    }
    .wb-btn-back:active { background: var(--primary); }
    
    .wb-actions { display: flex; gap: 10px; }
    .wb-icon-btn {
      width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.1);
      color: white; border: none; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer;
    }

    .wb-content { flex: 1; width: 100%; height: 100%; border: none; background: white; }

    /* --- HISTORY PAGE --- */
    .search-bar {
      background: var(--card); border: 1px solid #374151; border-radius: 12px;
      padding: 15px; display: flex; align-items: center; gap: 10px; color: var(--text-muted); margin-bottom: 20px;
    }
    .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; font-family: inherit; font-size: 14px; }

    .history-card {
      background: var(--card); border: 1px solid #374151; border-radius: 14px; padding: 16px;
      margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
    }
    .h-left { display: flex; align-items: center; gap: 12px; }
    .h-icon { width: 38px; height: 38px; background: rgba(79, 70, 229, 0.1); border-radius: 10px; color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .h-info h4 { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
    .h-info p { font-size: 11px; color: var(--text-muted); }
    .h-btns { display: flex; gap: 8px; }
    .h-btn {
      padding: 8px; border-radius: 8px; border: none; background: rgba(255,255,255,0.05); color: white; cursor: pointer;
    }
    .h-btn.share:hover { color: var(--primary); }
    .h-btn.delete:hover { color: var(--danger); }

    .stats-box {
      background: linear-gradient(135deg, #4F46E5, #312E81); border-radius: 16px; padding: 20px;
      margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between;
    }
    .stats-num { font-size: 32px; font-weight: 800; color: white; }
    .stats-label { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 600; }

    /* --- BOTTOM NAV --- */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; width: 100%; height: calc(70px + var(--safe-bottom));
      padding-bottom: var(--safe-bottom); background: rgba(17, 24, 39, 0.95);
      backdrop-filter: blur(10px); border-top: 1px solid #374151;
      display: flex; justify-content: space-around; align-items: center; z-index: 100;
    }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #6B7280; transition: 0.3s; cursor: pointer; }
    .nav-item i { font-size: 20px; margin-bottom: 4px; }
    .nav-item span { font-size: 10px; font-weight: 600; }
    .nav-item.active { color: var(--primary); }

  </style>
</head>
<body>

  <!-- PAGE: HOME -->
  <div class="page active" id="view-home">
    <div class="container">
      <header>
        <div class="brand"><div class="logo">CP</div><div class="brand-info"><h1>CVPRO</h1><p>Operator v967</p></div></div>
        <div style="font-size:14px; font-weight:700; color:white;" id="clock">--:--</div>
      </header>

      <div class="menu-grid">
        <div class="menu-item" onclick="openApp('ATS', 'https://45.dunnak.com')">
          <div class="icon-box"><i class="fas fa-briefcase"></i></div>
          <div class="menu-text"><div class="menu-label">ATS Portal</div><div class="menu-sub">Rekrutmen</div></div>
        </div>
        <div class="menu-item" onclick="openApp('LAMARAN', 'https://46.dunnak.com')">
          <div class="icon-box"><i class="fas fa-file-signature"></i></div>
          <div class="menu-text"><div class="menu-label">Lamaran</div><div class="menu-sub">Dokumen</div></div>
        </div>
        <div class="menu-item" onclick="openApp('RESIGN', 'https://47.dunnak.com')">
          <div class="icon-box"><i class="fa-solid fa-envelope-open-text"></i></div>
          <div class="menu-text"><div class="menu-label">Resign</div><div class="menu-sub">HR System</div></div>
        </div>
        <div class="menu-item" onclick="openApp('CREATIVE 1', 'https://51.dunnak.com')">
          <div class="icon-box"><i class="fas fa-palette"></i></div>
          <div class="menu-text"><div class="menu-label">Creative 1</div><div class="menu-sub">Design</div></div>
        </div>
        <div class="menu-item" onclick="openApp('CREATIVE 2', 'https://52.dunnak.com')">
          <div class="icon-box"><i class="fas fa-layer-group"></i></div>
          <div class="menu-text"><div class="menu-label">Creative 2</div><div class="menu-sub">Design</div></div>
        </div>
        <div class="menu-item" onclick="openApp('CREATIVE 3', 'https://53.dunnak.com')">
          <div class="icon-box"><i class="fas fa-bezier-curve"></i></div>
          <div class="menu-text"><div class="menu-label">Creative 3</div><div class="menu-sub">Design</div></div>
        </div>
        <div class="menu-item" onclick="openApp('ATS ENTRY', 'https://school.dunnak.com')">
          <div class="icon-box"><i class="fas fa-camera-retro"></i></div>
          <div class="menu-text"><div class="menu-label">Entry</div><div class="menu-sub">Scanner</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- PAGE: HISTORY -->
  <div class="page" id="view-history">
    <div class="container">
      <header><div class="brand-info"><h1>Riwayat</h1><p>Manajemen Proyek</p></div></header>

      <div class="stats-box">
        <div>
          <div class="stats-num" id="total-access">0</div>
          <div class="stats-label">Total Akses Modul</div>
        </div>
        <i class="fas fa-chart-line" style="font-size:30px; color:rgba(255,255,255,0.3);"></i>
      </div>

      <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Cari history proyek..." onkeyup="filterHistory()">
      </div>

      <div id="history-list">
        <!-- List dirender oleh JS -->
      </div>

      <div style="text-align:center; margin-top:30px;">
        <button onclick="clearAllHistory()" style="background:transparent; border:1px solid #EF4444; color:#EF4444; padding:10px 20px; border-radius:10px; font-weight:600;">Reset Semua Data</button>
      </div>
    </div>
  </div>

  <!-- WEBVIEW OVERLAY -->
  <div id="webview-overlay">
    <div class="wb-header">
      <!-- Tombol Kembali (Back) yang Jelas -->
      <button class="wb-btn-back" onclick="closeWebview()">
        <i class="fas fa-chevron-left"></i> Kembali
      </button>
      
      <div class="wb-title" id="wb-title">Modul Aktif</div>
      
      <div class="wb-actions">
        <button class="wb-icon-btn" onclick="shareCurrentUrl()" title="Bagikan Link">
          <i class="fas fa-share-alt"></i>
        </button>
      </div>
    </div>
    
    <iframe id="app-frame" class="wb-content" src="about:blank"></iframe>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('view-home', this)">
      <i class="fas fa-home"></i><span>Beranda</span>
    </div>
    <div class="nav-item" onclick="switchPage('view-history', this)">
      <i class="fas fa-history"></i><span>Riwayat</span>
    </div>
  </nav>

  <script>
    // --- LOGIC ---
    const webviewOverlay = document.getElementById('webview-overlay');
    const appFrame = document.getElementById('app-frame');
    const wbTitle = document.getElementById('wb-title');
    let currentUrl = '';

    function openApp(title, url) {
      currentUrl = url;
      wbTitle.innerText = title;
      webviewOverlay.classList.add('active');
      appFrame.src = url;
      saveHistory(title, url);
    }

    function closeWebview() {
      webviewOverlay.classList.remove('active');
      setTimeout(() => { appFrame.src = 'about:blank'; }, 300);
    }

    function shareCurrentUrl() {
      if (navigator.share) {
        navigator.share({
          title: 'CVPRO Project Link',
          text: 'Buka proyek ini di CVPRO:',
          url: currentUrl
        }).catch(console.error);
      } else {
        // Fallback untuk desktop atau browser lama
        prompt("Salin Link ini:", currentUrl);
      }
    }

    // --- HISTORY ENGINE ---
    const PREFIX = 'cp_hist_967_';

    function saveHistory(name, url) {
      const key = PREFIX + name.replace(/\s/g, '');
      let data = JSON.parse(localStorage.getItem(key)) || { count: 0, ts: 0 };
      data.count++;
      data.ts = Date.now();
      data.name = name;
      data.url = url;
      localStorage.setItem(key, JSON.stringify(data));
      updateStats();
      renderHistory();
    }

    function updateStats() {
      let total = 0;
      Object.keys(localStorage).forEach(k => {
        if(k.startsWith(PREFIX)) total += JSON.parse(localStorage.getItem(k)).count;
      });
      document.getElementById('total-access').innerText = total;
    }

    function renderHistory(filterText = '') {
      const list = document.getElementById('history-list');
      list.innerHTML = '';
      let items = [];
      Object.keys(localStorage).forEach(k => {
        if(k.startsWith(PREFIX)) items.push(JSON.parse(localStorage.getItem(k)));
      });

      // Filter & Sort
      if(filterText) items = items.filter(i => i.name.toLowerCase().includes(filterText.toLowerCase()));
      items.sort((a,b) => b.ts - a.ts);

      if(items.length === 0) {
        list.innerHTML = '<div style="text-align:center; color:#6B7280; padding:40px; font-size:13px;">Riwayat kosong.</div>';
        return;
      }

      items.forEach(item => {
        const date = new Date(item.ts).toLocaleDateString('id-ID', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
        
        const div = document.createElement('div');
        div.className = 'history-card fade-in';
        div.innerHTML = `
          <div class="h-left" onclick="openApp('${item.name}', '${item.url}')">
            <div class="h-icon"><i class="fas fa-clock"></i></div>
            <div class="h-info">
              <h4>${item.name}</h4>
              <p>${date} • ${item.count}x akses</p>
            </div>
          </div>
          <div class="h-btns">
            <button class="h-btn share" onclick="shareItem('${item.url}')"><i class="fas fa-share-alt"></i></button>
            <button class="h-btn delete" onclick="deleteHistory('${PREFIX}${item.name.replace(/\s/g,'')}')"><i class="fas fa-trash"></i></button>
          </div>
        `;
        list.appendChild(div);
      });
    }

    function shareItem(url) {
      if (navigator.share) navigator.share({ url: url }).catch(()=>{});
      else prompt("Link:", url);
    }

    function deleteHistory(key) {
      if(confirm("Hapus history ini?")) {
        localStorage.removeItem(key);
        updateStats();
        renderHistory(document.getElementById('search-input').value);
      }
    }

    function clearAllHistory() {
      if(confirm("Yakin hapus semua riwayat?")) {
        Object.keys(localStorage).forEach(k => {
          if(k.startsWith(PREFIX)) localStorage.removeItem(k);
        });
        updateStats();
        renderHistory();
      }
    }

    function filterHistory() {
      renderHistory(document.getElementById('search-input').value);
    }

    // --- NAVIGATION ---
    function switchPage(id, el) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
      if(id === 'view-history') renderHistory();
    }

    // --- CLOCK ---
    setInterval(() => {
      document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
    }, 1000);

    // --- INIT ---
    updateStats();

    // PWA Manifest
    const manifest = {
      name: "CVPRO Master", short_name: "CVPRO", start_url: ".", display: "standalone",
      background_color: "#111827", theme_color: "#111827",
      icons: [{src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='120' fill='%23111827'/><text x='256' y='350' font-size='260' font-family='sans-serif' font-weight='800' fill='white' text-anchor='middle'>CP</text></svg>", sizes: "512x512", type: "image/svg+xml"}]
    };
    document.head.appendChild(Object.assign(document.createElement('link'),{rel:'manifest', href:URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/json'}))}));
  </script>
</body>
</html>
