  <script>
    // Update Tanggal & Waktu Real-time
    function updateDateTime() {
      const now = new Date();
      const dateOptions = { 
        weekday: 'long', 
        day: 'numeric', 
        month: 'long', 
        year: 'numeric' 
      };
      const dateStr = now.toLocaleDateString('id-ID', dateOptions);
      const timeStr = now.toLocaleTimeString('id-ID', { 
        hour: '2-digit', 
        minute: '2-digit' 
      });

      document.getElementById('datetime').innerHTML = `
        ${dateStr}<br>
        <strong>${timeStr} WIB</strong>
      `;
    }

    setInterval(updateDateTime, 1000);
    updateDateTime();

    // Service Worker hanya dijalankan jika bukan di dalam iframe/sandbox
    function isInIframe() {
      try {
        return window.self !== window.top;
      } catch (e) {
        return true;
      }
    }

    if ('serviceWorker' in navigator && !isInIframe()) {
      const swCode = `
        const CACHE_NAME = 'rekrutmen-operator-v1';
        const urlsToCache = ['./', 'index.html'];

        self.addEventListener('install', event => {
          event.waitUntil(
            caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache))
          );
        });

        self.addEventListener('fetch', event => {
          event.respondWith(
            caches.match(event.request).then(response => response || fetch(event.request))
          );
        });
      `;

      const blob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(blob);

      navigator.serviceWorker.register(swUrl)
        .then(() => console.log('✅ PWA Service Worker aktif'))
        .catch(err => console.log('Service Worker gagal:', err));
    }
  </script>
