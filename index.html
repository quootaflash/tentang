<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CVPRO Operator</title>

  <!-- PWA & ICON SETTINGS -->
  <meta name="theme-color" content="#111827">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CVPRO">
  
  <!-- 1. FAVICON untuk Browser Tab -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%234F46E5'/><text x='50' y='68' font-size='40' font-family='Arial,sans-serif' font-weight='900' fill='white' text-anchor='middle'>CP</text></svg>">

  <!-- 2. APPLE TOUCH ICON untuk iOS Home Screen -->
  <!-- Menggunakan placeholder gambar yang konsisten agar icon terbaca saat "Add to Home Screen" -->
  <link rel="apple-touch-icon" href="https://picsum.photos/seed/cvproicon2024/180/180">

  <!-- FONTS & ICONS LIBRARY -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4F46E5; /* Indigo 600 */
      --primary-dark: #312E81;
      --bg: #111827;      /* Gray 900 */
      --card: #1F2937;    /* Gray 800 */
      --border: #374151;  /* Gray 700 */
      --text: #F9FAFB;
      --text-muted: #9CA3AF;
      --danger: #EF4444;
      --safe-bottom: env(safe-area-inset-bottom, 20px);
      --safe-top: env(safe-area-inset-top, 10px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; outline: none; }
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* --- UTILITIES --- */
    .fade-in { animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    
    /* --- SCROLLBAR HIDE --- */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* --- PAGES --- */
    .page {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: calc(var(--safe-top) + 20px) 20px calc(90px + var(--safe-bottom)) 20px;
      display: none; opacity: 0; transition: opacity 0.2s ease;
    }
    .page.active { display: block; opacity: 1; }

    .container { max-width: 600px; margin: 0 auto; position: relative; }

    /* --- HEADER & LOGO --- */
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .brand { display: flex; align-items: center; gap: 15px; }
    
    /* Logo Box SVG Inline */
    .logo-box {
      width: 50px; height: 50px; 
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 14px; 
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
      position: relative;
      overflow: hidden;
    }
    /* Efek kilau pada logo */
    .logo-box::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
      transform: skewX(-25deg);
      animation: shine 3s infinite;
    }
    @keyframes shine { 0%, 80% { left: -100%; } 100% { left: 200%; } }

    .brand-info h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; }
    .brand-info p { font-size: 10px; font-weight: 700; color: var(--primary); letter-spacing: 1.2px; text-transform: uppercase; margin-top: 4px; }

    .clock-display {
      font-family: 'Plus Jakarta Sans', monospace; font-size: 14px; font-weight: 700; 
      background: var(--card); padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); color: white;
    }

    /* --- MENU GRID --- */
    .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .menu-item {
      background: var(--card); border: 1px solid var(--border); border-radius: 18px; 
      padding: 18px; display: flex; align-items: center; gap: 14px; 
      transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1); position: relative; overflow: hidden; cursor: pointer;
    }
    .menu-item:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .menu-item:active { transform: scale(0.96); }
    
    .icon-box { 
      width: 44px; height: 44px; border-radius: 12px; 
      background: rgba(79, 70, 229, 0.1); color: var(--primary); 
      display: flex; align-items: center; justify-content: center; font-size: 18px; 
      transition: 0.3s;
    }
    .menu-item:hover .icon-box { background: var(--primary); color: white; }
    
    .menu-text { display: flex; flex-direction: column; }
    .menu-label { font-size: 15px; font-weight: 700; color: var(--text); }
    .menu-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }

    /* --- WEBVIEW OVERLAY --- */
    #webview-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; z-index: 9999; display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #webview-overlay.active { transform: translateY(0); }

    .wb-header {
      height: 70px; padding: 0 20px; padding-top: var(--safe-top);
      background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
    }
    .wb-title { font-size: 14px; font-weight: 700; color: white; }
    
    .wb-btn-back {
      display: flex; align-items: center; gap: 8px; color: white; font-size: 14px; font-weight: 600;
      background: rgba(255,255,255,0.1); padding: 8px 14px; border-radius: 10px; border: none; cursor: pointer;
    }
    .wb-btn-back:active { background: var(--primary); }
    
    .wb-actions { display: flex; gap: 10px; }
    .wb-icon-btn {
      width: 38px; height: 38px; border-radius: 10px; background: rgba(255,255,255,0.1);
      color: white; border: none; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .wb-icon-btn:active { background: var(--primary); }

    .wb-content { flex: 1; width: 100%; height: 100%; border: none; background: white; }

    /* --- HISTORY PAGE --- */
    .search-bar {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; display: flex; align-items: center; gap: 12px; color: var(--text-muted); margin-bottom: 20px;
    }
    .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; font-family: inherit; font-size: 14px; }

    .stats-box {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
      border-radius: 18px; padding: 22px; margin-bottom: 25px; 
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
    }
    .stats-info h2 { font-size: 32px; font-weight: 800; color: white; line-height: 1; margin-bottom: 4px; }
    .stats-info p { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    .history-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px;
      margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
      transition: 0.2s;
    }
    .history-card:active { background: #2d3748; }
    .h-left { display: flex; align-items: center; gap: 14px; flex: 1; }
    .h-icon { width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 10px; color: #9CA3AF; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .h-info h4 { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
    .h-info p { font-size: 11px; color: var(--text-muted); }
    .h-btns { display: flex; gap: 8px; }
    .h-btn {
      width: 36px; height: 36px; border-radius: 10px; border: none; 
      background: rgba(255,255,255,0.05); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .h-btn.share:hover { color: var(--primary); background: rgba(79, 70, 229, 0.1); }
    .h-btn.delete:hover { color: var(--danger); background: rgba(239, 68, 68, 0.1); }

    /* --- BOTTOM NAV --- */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; width: 100%; height: calc(70px + var(--safe-bottom));
      padding-bottom: var(--safe-bottom); background: rgba(17, 24, 39, 0.9);
      backdrop-filter: blur(12px); border-top: 1px solid var(--border);
      display: flex; justify-content: space-around; align-items: center; z-index: 100;
    }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #6B7280; transition: 0.3s; cursor: pointer; height: 100%; }
    .nav-item i { font-size: 20px; margin-bottom: 4px; transition: 0.3s; }
    .nav-item span { font-size: 10px; font-weight: 600; }
    .nav-item.active { color: var(--primary); }
    .nav-item.active i { transform: translateY(-2px); }

    /* --- TOAST NOTIFICATION --- */
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(255,255,255,0.95); color: #111827; padding: 10px 20px; 
      border-radius: 30px; font-size: 13px; font-weight: 600; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      opacity: 0; pointer-events: none; transition: 0.3s; z-index: 200; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  </style>
</head>
<body>

  <!-- PAGE: HOME -->
  <div class="page active no-scrollbar" id="view-home">
    <div class="container">
      <header>
        <div class="brand">
          <div class="logo-box">
            <!-- Inline SVG Logo agar tajam dan ringan -->
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="24" height="24" rx="6" fill="white"/>
              <path d="M7 7H10V17H7V7Z" fill="#4F46E5"/>
              <path d="M14 7H17V17H14V7Z" fill="#4F46E5"/>
            </svg>
          </div>
          <div class="brand-info"><h1>CVPRO</h1><p>Operator v967</p></div>
        </div>
        <div class="clock-display" id="clock">--:--</div>
      </header>

      <div class="menu-grid fade-in">
        <div class="menu-item" onclick="openApp('ATS Portal', 'https://45.dunnak.com')">
          <div class="icon-box"><i class="fas fa-briefcase"></i></div>
          <div class="menu-text"><div class="menu-label">ATS</div><div class="menu-sub">Rekrutmen</div></div>
        </div>
        <div class="menu-item" onclick="openApp('Lamaran', 'https://46.dunnak.com')">
          <div class="icon-box"><i class="fas fa-file-signature"></i></div>
          <div class="menu-text"><div class="menu-label">Lamaran</div><div class="menu-sub">Dokumen</div></div>
        </div>
        <div class="menu-item" onclick="openApp('Resign', 'https://47.dunnak.com')">
          <div class="icon-box"><i class="fa-solid fa-envelope-open-text"></i></div>
          <div class="menu-text"><div class="menu-label">Resign</div><div class="menu-sub">HR System</div></div>
        </div>
        <div class="menu-item" onclick="openApp('Creative 1', 'https://51.dunnak.com')">
          <div class="icon-box"><i class="fas fa-palette"></i></div>
          <div class="menu-text"><div class="menu-label">Creative 1</div><div class="menu-sub">Design</div></div>
        </div>
        <div class="menu-item" onclick="openApp('Creative 2', 'https://52.dunnak.com')">
          <div class="icon-box"><i class="fas fa-layer-group"></i></div>
          <div class="menu-text"><div class="menu-label">Creative 2</div><div class="menu-sub">Design</div></div>
        </div>
        <div class="menu-item" onclick="openApp('Creative 3', 'https://53.dunnak.com')">
          <div class="icon-box"><i class="fas fa-bezier-curve"></i></div>
          <div class="menu-text"><div class="menu-label">Creative 3</div><div class="menu-sub">Design</div></div>
        </div>
        <div class="menu-item" onclick="openApp('Scanner Entry', 'https://school.dunnak.com')">
          <div class="icon-box"><i class="fas fa-camera-retro"></i></div>
          <div class="menu-text"><div class="menu-label">Scanner</div><div class="menu-sub">Entry Data</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- PAGE: HISTORY -->
  <div class="page no-scrollbar" id="view-history">
    <div class="container">
      <header>
        <div class="brand-info"><h1>Riwayat</h1><p>Manajemen Proyek</p></div>
      </header>

      <div class="stats-box fade-in">
        <div class="stats-info">
          <h2 id="total-access">0</h2>
          <p>Total Akses Modul</p>
        </div>
        <i class="fas fa-chart-pie" style="font-size: 40px; color: rgba(255,255,255,0.2);"></i>
      </div>

      <div class="search-bar fade-in" style="animation-delay: 0.1s;">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Cari history proyek..." onkeyup="filterHistory()">
      </div>

      <div id="history-list">
        <!-- List akan diisi oleh JavaScript -->
      </div>

      <div style="text-align:center; margin-top:30px; padding-bottom: 20px;">
        <button onclick="clearAllHistory()" style="background:transparent; border:1px solid #374151; color:#9CA3AF; padding:12px 24px; border-radius:12px; font-weight:600; font-size:13px;">Reset Semua Data</button>
      </div>
    </div>
  </div>

  <!-- WEBVIEW OVERLAY -->
  <div id="webview-overlay">
    <div class="wb-header">
      <button class="wb-btn-back" onclick="closeWebview()">
        <i class="fas fa-chevron-left"></i> Kembali
      </button>
      
      <div class="wb-title" id="wb-title">Modul Aktif</div>
      
      <div class="wb-actions">
        <button class="wb-icon-btn" onclick="shareCurrentUrl()" title="Bagikan Link">
          <i class="fas fa-share-alt"></i>
        </button>
        <button class="wb-icon-btn" onclick="refreshWebview()" title="Refresh">
          <i class="fas fa-sync-alt"></i>
        </button>
      </div>
    </div>
    
    <!-- Allow Popups and Same Origin for better compatibility -->
    <iframe id="app-frame" class="wb-content" src="about:blank" allow="encrypted-media; fullscreen; clipboard-read; clipboard-write"></iframe>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('view-home', this)">
      <i class="fas fa-home"></i><span>Beranda</span>
    </div>
    <div class="nav-item" onclick="switchPage('view-history', this)">
      <i class="fas fa-history"></i><span>Riwayat</span>
    </div>
  </nav>

  <!-- TOAST NOTIFICATION -->
  <div id="toast" class="toast">Notifikasi</div>

  <script>
    // --- CONFIG ---
    const STORAGE_PREFIX = 'cp_hist_967_';
    
    // --- ELEMENTS ---
    const webviewOverlay = document.getElementById('webview-overlay');
    const appFrame = document.getElementById('app-frame');
    const wbTitle = document.getElementById('wb-title');
    const toastEl = document.getElementById('toast');
    let currentUrl = '';

    // --- NAVIGATION LOGIC ---
    function openApp(title, url) {
      currentUrl = url;
      wbTitle.innerText = title;
      webviewOverlay.classList.add('active');
      appFrame.src = url;
      saveHistory(title, url);
    }

    function closeWebview() {
      webviewOverlay.classList.remove('active');
      // Delay clear src agar animasi transisi lebih mulus
      setTimeout(() => { appFrame.src = 'about:blank'; }, 300);
    }

    function refreshWebview() {
      appFrame.src = appFrame.src;
      showToast("Memuat ulang halaman...");
    }

    function shareCurrentUrl() {
      if (navigator.share) {
        navigator.share({
          title: 'CVPRO Project Link',
          text: 'Buka proyek ini di CVPRO:',
          url: currentUrl
        }).catch(console.error);
      } else {
        // Fallback copy
        navigator.clipboard.writeText(currentUrl);
        showToast("Link disalin ke clipboard");
      }
    }

    function showToast(msg) {
      toastEl.innerText = msg;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 2500);
    }

    // --- HISTORY ENGINE ---
    function saveHistory(name, url) {
      const key = STORAGE_PREFIX + name.replace(/\s+/g, '');
      let data = JSON.parse(localStorage.getItem(key)) || { count: 0, ts: 0 };
      data.count++;
      data.ts = Date.now();
      data.name = name;
      data.url = url;
      localStorage.setItem(key, JSON.stringify(data));
      updateStats();
      renderHistory();
    }

    function updateStats() {
      let total = 0;
      Object.keys(localStorage).forEach(k => {
        if(k.startsWith(STORAGE_PREFIX)) {
          try {
            total += JSON.parse(localStorage.getItem(k)).count;
          } catch(e) {}
        }
      });
      document.getElementById('total-access').innerText = total;
    }

    function renderHistory(filterText = '') {
      const list = document.getElementById('history-list');
      list.innerHTML = '';
      let items = [];
      
      Object.keys(localStorage).forEach(k => {
        if(k.startsWith(STORAGE_PREFIX)) {
          try {
            items.push(JSON.parse(localStorage.getItem(k)));
          } catch(e) {}
        }
      });

      // Filter & Sort (Latest first)
      if(filterText) items = items.filter(i => i.name.toLowerCase().includes(filterText.toLowerCase()));
      items.sort((a,b) => b.ts - a.ts);

      if(items.length === 0) {
        list.innerHTML = '<div style="text-align:center; color:#4B5563; padding:50px 20px; font-size:13px; display:flex; flex-direction:column; align-items:center; gap:10px;"><i class="fas fa-folder-open" style="font-size:30px; margin-bottom:10px;"></i><br>Belum ada riwayat akses.</div>';
        return;
      }

      items.forEach((item, index) => {
        const date = new Date(item.ts).toLocaleDateString('id-ID', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
        
        const div = document.createElement('div');
        div.className = 'history-card fade-in';
        div.style.animationDelay = `${index * 0.05}s`; // Stagger effect
        div.innerHTML = `
          <div class="h-left" onclick="openApp('${item.name}', '${item.url}')">
            <div class="h-icon"><i class="fas fa-history"></i></div>
            <div class="h-info">
              <h4>${item.name}</h4>
              <p>${date} • Dibuka <b>${item.count}x</b></p>
            </div>
          </div>
          <div class="h-btns">
            <button class="h-btn share" onclick="shareItem('${item.url}')"><i class="fas fa-share-alt"></i></button>
            <button class="h-btn delete" onclick="deleteHistory('${STORAGE_PREFIX}${item.name.replace(/\s+/g,'')}')"><i class="fas fa-trash"></i></button>
          </div>
        `;
        list.appendChild(div);
      });
    }

    function shareItem(url) {
      if (navigator.share) navigator.share({ url: url }).catch(()=>{});
      else {
        navigator.clipboard.writeText(url);
        showToast("Link disalin");
      }
    }

    function deleteHistory(key) {
      if(confirm("Hapus history ini?")) {
        localStorage.removeItem(key);
        updateStats();
        renderHistory(document.getElementById('search-input').value);
        showToast("History dihapus");
      }
    }

    function clearAllHistory() {
      if(confirm("Apakah Anda yakin ingin menghapus semua riwayat?")) {
        Object.keys(localStorage).forEach(k => {
          if(k.startsWith(STORAGE_PREFIX)) localStorage.removeItem(k);
        });
        updateStats();
        renderHistory();
        showToast("Semua data direset");
      }
    }

    function filterHistory() {
      renderHistory(document.getElementById('search-input').value);
    }

    // --- TAB SWITCHING ---
    function switchPage(id, el) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
      
      if(id === 'view-history') renderHistory();
    }

    // --- CLOCK ---
    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
    }, 1000);
    // Set immediate
    document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});

    // --- INIT ---
    updateStats();

    // --- PWA MANIFEST DYNAMIC INJECTION ---
    // Menggunakan icon eksternal agar terdeteksi sebagai "App Icon" saat install PWA
    const manifestData = {
      name: "CVPRO Operator",
      short_name: "CVPRO",
      start_url: ".",
      display: "standalone",
      background_color: "#111827",
      theme_color: "#111827",
      description: "Aplikasi Manajemen Operator CVPRO",
      icons: [
        {
          src: "https://picsum.photos/seed/cvproicon2024/192/192",
          sizes: "192x192",
          type: "image/jpeg"
        },
        {
          src: "https://picsum.photos/seed/cvproicon2024/512/512",
          sizes: "512x512",
          type: "image/jpeg"
        }
      ]
    };
    
    const stringManifest = JSON.stringify(manifestData);
    const blob = new Blob([stringManifest], {type: 'application/json'});
    const manifestURL = URL.createObjectURL(blob);
    
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = manifestURL;
    document.head.appendChild(link);

  </script>
</body>
</html>
