<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">

  <!-- Meta wajib PWA -->

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CVPRO">
  
  <!-- Icon untuk iOS (Menggunakan generator favicon inline SVG agar selalu muncul tanpa file eksternal) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232980b9'/><text x='50' y='68' font-size='50' font-family='Arial,sans-serif' font-weight='bold' fill='white' text-anchor='middle'>CP</text></svg>">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      min-height: 100vh;
      color: #2c3e50;
      padding: 20px 15px;
    }

    .container { max-width: 440px; margin: 0 auto; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 35px;
      padding: 8px 5px;
    }

    .logo-container { display: flex; align-items: center; gap: 14px; }

    .logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #3498db, #2980b9);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 26px; font-weight: bold;
      box-shadow: 0 6px 14px rgba(52, 152, 219, 0.35);
    }

    .header-text h1 { font-size: 23px; font-weight: 700; margin-bottom: 3px; }
    .header-text p { font-size: 14.5px; color: #6c757d; }

    .datetime {
      text-align: right; font-size: 13.5px; color: #6c757d; line-height: 1.45;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
      gap: 20px;
    }

    .menu-item {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: white; border-radius: 22px;
      padding: 26px 14px; text-decoration: none; color: #2c3e50;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
      transition: all 0.35s ease; height: 148px;
    }

    .menu-item:hover, .menu-item:active {
      transform: translateY(-8px);
      box-shadow: 0 16px 32px rgba(52, 152, 219, 0.20);
    }

    .menu-item i {
      font-size: 40px; margin-bottom: 16px;
      transition: transform 0.35s ease;
    }

    .menu-item:hover i, .menu-item:active i { transform: scale(1.18); }
    .menu-item span { font-size: 15px; font-weight: 600; text-align: center; line-height: 1.35; }

    .ats i      { color: #2980b9; }
    .lamaran i  { color: #27ae60; }
    .whatsapp i { color: #25D366; }

    .footer {
      text-align: center; margin-top: 55px;
      font-size: 13px; color: #95a5a6;
    }

    /* Notifikasi Install PWA */
    .install-banner {
      position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
      background: #2c3e50; color: white; padding: 16px 24px;
      border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      display: flex; align-items: center; gap: 15px; z-index: 999;
      transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      max-width: 90vw;
    }
    .install-banner.show { bottom: 30px; }
    .install-banner button {
      background: #3498db; border: none; color: white;
      padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer;
    }
    .install-banner .dismiss { background: transparent; color: #95a5a6; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div class="logo-container">
        <div class="logo">CP</div>
        <div class="header-text">
          <h1>CVPRO</h1>
          <p>Operator</p>
        </div>
      </div>
      <div class="datetime" id="datetime"></div>
    </header>

    <div class="menu-grid">
      <a href="https://45.dunnak.com" target="_blank" class="menu-item ats">
        <i class="fas fa-briefcase"></i>
        <span>ATS</span>
      </a>

      <a href="https://46.dunnak.com" target="_blank" class="menu-item lamaran">
        <i class="fas fa-file-alt"></i>
        <span>LAMARAN</span>
      </a>

      <a href="https://47.dunnak.com" target="_blank" class="menu-item">
        <i class="fa-solid fa-envelope" style="color:#A67D22;"></i>
        <span>RESIGN</span>
      </a>

      <a href="https://51.dunnak.com" target="_blank" class="menu-item">
        <i class="fas fa-brush" style="color:#F67e82;"></i>
        <span>CREATIV 1</span>
      </a>

      <a href="https://52.dunnak.com" target="_blank" class="menu-item">
        <i class="fas fa-brush" style="color:#C4a7e3;"></i>
        <span>CREATIVE 2</span>
      </a>

      <a href="https://53.dunnak.com" target="_blank" class="menu-item">
        <i class="fas fa-brush" style="color:#A6cF9;"></i>
        <span>CREATIVE 3</span>
      </a>

      <a href="https://school.dunnak.com" target="_blank" class="menu-item">
        <i class="fas fa-camera"></i>
        <span>ATS ENTRY</span>
      </a>
    </div>

    <div class="footer">
      © 2026 CVPRO<br>
      Semarang • Semua hak dilindungi
    </div>
  </div>

  <!-- Popup Install PWA -->
  <div class="install-banner" id="installBanner">
    <i class="fas fa-download" style="font-size: 24px;"></i>
    <div>
      <div style="font-size: 14px; font-weight: bold;">Install CVPRO</div>
      <div style="font-size: 12px; color: #bdc3c7;">Akses cepat dari homescreen</div>
    </div>
    <button id="installBtn">Install</button>
    <button class="dismiss" id="dismissBtn"><i class="fas fa-times"></i></button>
  </div>

  <script>
    // ==========================================
    // 1. INJECT MANIFEST SECARA DINAMIS
    // ==========================================
    const iconSvg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='100' fill='%232980b9'/><text x='256' y='350' font-size='280' font-family='Arial,sans-serif' font-weight='bold' fill='white' text-anchor='middle'>CP</text></svg>`;
    const iconBlob = new Blob([iconSvg], { type: 'image/svg+xml' });
    const iconUrl = URL.createObjectURL(iconBlob);

    const manifestData = {
      name: "CVPRO - Operator Tools",
      short_name: "CVPRO",
      description: "Menu Tools Operator Rekrutmen CVPRO",
      start_url: "./",
      display: "standalone",
      background_color: "#f8f9fa",
      theme_color: "#2980b9",
      icons: [
        { src: iconUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
      ]
    };

    const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/json' });
    const manifestUrl = URL.createObjectURL(manifestBlob);
    
    // Pasang link manifest ke <head>
    const manifestLink = document.createElement('link');
    manifestLink.rel = 'manifest';
    manifestLink.href = manifestUrl;
    document.head.appendChild(manifestLink);


    // ==========================================
    // 2. SERVICE WORKER REGISTRATION
    // ==========================================
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE_NAME = 'cvpro-tools-v1';
        const urlsToCache = ['./', 'index.html'];

        self.addEventListener('install', event => {
          self.skipWaiting();
          event.waitUntil(
            caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache))
          );
        });

        self.addEventListener('activate', event => {
          event.waitUntil(
            caches.keys().then(names => 
              Promise.all(names.filter(n => n !== CACHE_NAME).map(n => caches.delete(n)))
            )
          );
          self.clients.claim();
        });

        self.addEventListener('fetch', event => {
          event.respondWith(
            caches.match(event.request).then(response => response || fetch(event.request))
          );
        });
      `;
      
      // Gunakan Blob untuk mendaftarkan Service Worker
      const swBlob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(swBlob);

      navigator.serviceWorker.register(swUrl, { scope: './' })
        .then(reg => console.log('✅ SW Aktif, Scope:', reg.scope))
        .catch(err => console.warn('SW Gagal (Normal jika di file lokal/file://):', err));
    }


    // ==========================================
    // 3. LOGIKA TOMBOL INSTALL PWA
    // ==========================================
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Tampilkan banner custom
      setTimeout(() => {
        document.getElementById('installBanner').classList.add('show');
      }, 3000);
    });

    document.getElementById('installBtn').addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          console.log('User menginstall PWA');
        }
        deferredPrompt = null;
        document.getElementById('installBanner').classList.remove('show');
      }
    });

    document.getElementById('dismissBtn').addEventListener('click', () => {
      document.getElementById('installBanner').classList.remove('show');
    });

    // Sembunyikan banner jika sudah terinstall
    window.addEventListener('appinstalled', () => {
      document.getElementById('installBanner').classList.remove('show');
      deferredPrompt = null;
    });


    // ==========================================
    // 4. JAM & TANGGAL REAL-TIME
    // ==========================================
    function updateDateTime() {
      const now = new Date();
      const dateStr = now.toLocaleDateString('id-ID', { 
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
      });
      const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

      document.getElementById('datetime').innerHTML = `
        ${dateStr}<br>
        <strong>${timeStr} WIB</strong>
      `;
    }

    setInterval(updateDateTime, 1000);
    updateDateTime();
  </script>
</body>
</html>
